kind = "web"
previewPath = "/"
title = "Tivra"
version = "1.0.0"
id = "artifacts/tivra"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21144

[services.development]
run = "pnpm --filter @workspace/tivra run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tivra", "run", "build" ]
publicDir = "artifacts/tivra/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21144"
BASE_PATH = "/"
